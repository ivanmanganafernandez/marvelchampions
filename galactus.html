<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador compartido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Estilos CSS -->
  <style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
  
  /* Imagen de fondo */
  background-image: url('./fondogalactus.jpg'); /* ruta de tu imagen */
  background-size: cover;       /* hace que cubra toda la pantalla */
  background-position: top center;  /* centra la imagen */
  background-repeat: no-repeat; /* evita que se repita */
  background-attachment: fixed; /* opcional: efecto parallax */
  
  color: white; /* opcional: para que el texto se vea sobre el fondo */
}

    h1 {
      font-size: 8rem; 
      margin: 20px 0;
      text-align: center;
      color: #FFF;
    }

    .botones {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-size: 2rem;
      padding: 15px 30px;
      margin: 5px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background-color: #9c598f;
      color: white;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #5d2b5c;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 8rem;
      }

      button {
        font-size: 2.5rem;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>

  <h1 id="contador">0</h1>

  <div class="fila-botones">
    <button onclick="restar(1)">-1</button>
    <button onclick="sumar(1)">+1</button>
  </div>

  <!-- Fila de +-10 -->
  <div class="fila-botones">
    <button onclick="restar(10)">-10</button>
    <button onclick="sumar(10)">+10</button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6AxztIL3sQnttXBdJoDHzF6afDPOwlz8",
      authDomain: "mcmasivo.firebaseapp.com",
      databaseURL: "https://mcmasivo-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "mcmasivo"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const contadorRef = ref(db, "contador");

    // Escuchar cambios en tiempo real
    onValue(contadorRef, (snapshot) => {
      document.getElementById("contador").textContent = snapshot.val() ?? 0;
    });

    // Funciones globales para sumar/restar
    window.sumar = function(valor) {
      runTransaction(contadorRef, (v) => (v || 0) + valor);
    };

    window.restar = function(valor) {
      runTransaction(contadorRef, (v) => (v || 0) - valor);
    };
  </script>

</body>
</html>
