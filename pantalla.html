<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contador compartido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Estilos CSS -->
  <style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
  
  /* Imagen de fondo */
  background-image: url('./fondo.jpg'); /* ruta de tu imagen */
  background-size: cover;       /* hace que cubra toda la pantalla */
  background-position: top center;  /* centra la imagen */
  background-repeat: no-repeat; /* evita que se repita */
  background-attachment: fixed; /* opcional: efecto parallax */
  
  color: white; /* opcional: para que el texto se vea sobre el fondo */
}

h1 {
  position: absolute;
  
  /* Centrado horizontal */
  left: 50%;
  transform: translateX(-50%);
  
  /* Tercio inferior */
  bottom: 15%;

  /* Tamaño grande y adaptable */
  font-size: 18vw;

  margin: 0;
  text-align: center;
}


  </style>
</head>
<body>

  <h1 id="contador">0</h1>

  
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6AxztIL3sQnttXBdJoDHzF6afDPOwlz8",
      authDomain: "mcmasivo.firebaseapp.com",
      databaseURL: "https://mcmasivo-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "mcmasivo"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const contadorRef = ref(db, "contador");

    // Escuchar cambios en tiempo real
    onValue(contadorRef, (snapshot) => {
      document.getElementById("contador").textContent = snapshot.val() ?? 0;
    });

      </script>

</body>
</html>
